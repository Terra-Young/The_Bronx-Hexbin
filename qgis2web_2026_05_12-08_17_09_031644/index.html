<!doctype html>
<html lang="en">

            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/L.Control.Locate.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>

        <script src="data/TheBronx_1.js"></script>
        <script src="data/BronxCollisionHotspots_2.js"></script>
        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(255, 255, 0, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(255, 255, 0, 1.00)',
                fillOpacity: 1
              });
            }
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[40.781736104552344,-74.0144265694352],[40.91882132280388,-73.68420200437379]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        L.control.locate({locateOptions: {maxZoom: 19}}).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'feet',
            secondaryLengthUnit: 'miles',
            primaryAreaUnit: 'sqfeet',
            secondaryAreaUnit: 'sqmiles'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0].className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_CartoDBDarkMatter_0');
        map.getPane('pane_CartoDBDarkMatter_0').style.zIndex = 400;
        var layer_CartoDBDarkMatter_0 = L.tileLayer('http://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
            pane: 'pane_CartoDBDarkMatter_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 18
        });
        layer_CartoDBDarkMatter_0;
        map.addLayer(layer_CartoDBDarkMatter_0);
        function pop_TheBronx_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['fid'] !== null ? autolinker.link(String(feature.properties['fid']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['borocode'] !== null ? autolinker.link(String(feature.properties['borocode']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['boroname'] !== null ? autolinker.link(String(feature.properties['boroname']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['shape_area'] !== null ? autolinker.link(String(feature.properties['shape_area']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['shape_leng'] !== null ? autolinker.link(String(feature.properties['shape_leng']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_TheBronx_1_0() {
            return {
                pane: 'pane_TheBronx_1',
                opacity: 1,
                color: 'rgba(92,92,92,1.0)',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 4.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(145,82,45,0.0)',
                interactive: false,
            }
        }
        map.createPane('pane_TheBronx_1');
        map.getPane('pane_TheBronx_1').style.zIndex = 401;
        map.getPane('pane_TheBronx_1').style['mix-blend-mode'] = 'normal';
        var layer_TheBronx_1 = new L.geoJson(json_TheBronx_1, {
            attribution: '',
            interactive: false,
            dataVar: 'json_TheBronx_1',
            layerName: 'layer_TheBronx_1',
            pane: 'pane_TheBronx_1',
            onEachFeature: pop_TheBronx_1,
            style: style_TheBronx_1_0,
        });
        bounds_group.addLayer(layer_TheBronx_1);
        map.addLayer(layer_TheBronx_1);
        function pop_BronxCollisionHotspots_2(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">crash_count</th>\
                        <td class="visible-with-data" id="crash_count">' + (feature.properties['crash_count'] !== null ? autolinker.link(String(feature.properties['crash_count']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }
        function style_BronxCollisionHotspots_2_0(feature) {
            var context = {
                feature: feature,
                variables: {}
            };
            // Start of if blocks and style check logic
            if (exp_BronxCollisionHotspots_2rule0_eval_expression(context)) {
                  return {
                pane: 'pane_BronxCollisionHotspots_2',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(49,54,149,1.0)',
                interactive: true,
            };
                }
                else if (exp_BronxCollisionHotspots_2rule1_eval_expression(context)) {
                  return {
                pane: 'pane_BronxCollisionHotspots_2',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(69,117,180,1.0)',
                interactive: true,
            };
                }
                else if (exp_BronxCollisionHotspots_2rule2_eval_expression(context)) {
                  return {
                pane: 'pane_BronxCollisionHotspots_2',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(116,173,209,1.0)',
                interactive: true,
            };
                }
                else if (exp_BronxCollisionHotspots_2rule3_eval_expression(context)) {
                  return {
                pane: 'pane_BronxCollisionHotspots_2',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(0,0,0,0.0)',
                interactive: true,
            };
                }
                else if (exp_BronxCollisionHotspots_2rule4_eval_expression(context)) {
                  return {
                pane: 'pane_BronxCollisionHotspots_2',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(253,174,97,1.0)',
                interactive: true,
            };
                }
                else if (exp_BronxCollisionHotspots_2rule5_eval_expression(context)) {
                  return {
                pane: 'pane_BronxCollisionHotspots_2',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(244,109,67,1.0)',
                interactive: true,
            };
                }
                else if (exp_BronxCollisionHotspots_2rule6_eval_expression(context)) {
                  return {
                pane: 'pane_BronxCollisionHotspots_2',
                stroke: false, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(215,48,39,1.0)',
                interactive: true,
            };
                }
            else {
                return {fill: false, stroke: false};
            }
        }
        map.createPane('pane_BronxCollisionHotspots_2');
        map.getPane('pane_BronxCollisionHotspots_2').style.zIndex = 402;
        map.getPane('pane_BronxCollisionHotspots_2').style['mix-blend-mode'] = 'normal';
        var layer_BronxCollisionHotspots_2 = new L.geoJson(json_BronxCollisionHotspots_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_BronxCollisionHotspots_2',
            layerName: 'layer_BronxCollisionHotspots_2',
            pane: 'pane_BronxCollisionHotspots_2',
            onEachFeature: pop_BronxCollisionHotspots_2,
            style: style_BronxCollisionHotspots_2_0,
        });
        bounds_group.addLayer(layer_BronxCollisionHotspots_2);
        map.addLayer(layer_BronxCollisionHotspots_2);
        var overlaysTree = [
            {label: 'Bronx Collision Hotspots<br /><table><tr><td style="text-align: center;"><img src="legend/BronxCollisionHotspots_2_Coldspot99Confidence0.png" /></td><td>Coldspot 99% Confidence</td></tr><tr><td style="text-align: center;"><img src="legend/BronxCollisionHotspots_2_Coldspot95Confidence1.png" /></td><td>Coldspot 95% Confidence</td></tr><tr><td style="text-align: center;"><img src="legend/BronxCollisionHotspots_2_Coldspot90Confidence2.png" /></td><td>Coldspot 90% Confidence</td></tr><tr><td style="text-align: center;"><img src="legend/BronxCollisionHotspots_2_NotSignificant3.png" /></td><td>Not Significant</td></tr><tr><td style="text-align: center;"><img src="legend/BronxCollisionHotspots_2_Hotspot90Confidence4.png" /></td><td>Hotspot 90% Confidence</td></tr><tr><td style="text-align: center;"><img src="legend/BronxCollisionHotspots_2_Hotspot95Confidence5.png" /></td><td>Hotspot 95% Confidence</td></tr><tr><td style="text-align: center;"><img src="legend/BronxCollisionHotspots_2_Hotspot99Confidence6.png" /></td><td>Hotspot 99% Confidence</td></tr></table>', layer: layer_BronxCollisionHotspots_2},
            {label: '<img src="legend/TheBronx_1.png" /> The Bronx', layer: layer_TheBronx_1},
            {label: "CartoDB Dark Matter", layer: layer_CartoDBDarkMatter_0, radioGroup: 'bm' },]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        </script>        
    </body>
